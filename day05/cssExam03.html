<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <style>

        div {
            border: 1px solid black;
        }

        .outline {
            width: 100px;
            height: 100px;
        }

        .child {
            /* vw, vh 기준은 document (브라우저 화면) , 반응형 */
            width: 50vw;
            height: 100vh;
        }

    </style>
</head>
<body>
     <div class="outline">
        <div class="child">자식</div>
    </div>

</body>
</html>
