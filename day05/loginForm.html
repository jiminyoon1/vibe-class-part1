<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        body {
            padding: 0;
            margin: 0;
        }

        .caontainer {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            height: 100vh;
            
        }
        
        .loginForm {
                width: 400px;
                height: 350px;
                border: 1px solid black;
                border-radius: 5px;
            }

        .Form {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .title {
            text-align: center;
        }

        .loginBtn {
            width: 100%;
            background-color: #4CAF50;
            border: none;
            border-radius: 5px;
            color: white;
        }   
    </style>
</head>
<body>
    <div class="caontainer">
        <div class="loginForm">
            <div class="Form">
                <form>
                    <span class="title"><h2>로그인</h2></span>
                    <div>
                        <input type="text" id="userId" placeholder="아이디 입력">
                    </div>
                    <div>
                        <input type="password" id="userPassword" placeholder="비밀번호 입력">
                    </div>
                    <div>
                        <button type="button" class="loginBtn" onclick="login();">로그인</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script>
         function login() {
            //html 값을 -> 자바스크립트로 가져올 수 있음
            //자바스크립트의 결과 값 -> html 에 적용 가능

            //html 영역을 자바스크립트에서는 document 라는 객체를 사용
            const userId = document.getElementById('userId');
            const userPassword = document.getElementById('userPassword');

            if (userId.value.trim().length === 0) {
                alert('아이디를 입력해주세요');
                //함수 끝내기
                return;
            }

            if (userPassword.value.trim().length === 0) {
                alert('비밀번호를 입력해주세요');
                //함수 끝내기
                return;
            }
            alert('로그인 성공');
        }
    </script>
</body>
</html>
