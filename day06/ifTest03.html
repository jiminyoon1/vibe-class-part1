<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button type="button" onclick="getvalue()">값출력</button>
    <p id="numbers"></p>

    <script>
        function getvalue() {
            const randVal = Math.floor(Math.random() * 20) + 1; 
            const pTag = document.querySelector('#numbers');
            pTag.textContent = `${randVal}세`;

            if(randVal >= 18) {
                alert(randVal + '세' + '성인');
            } else if(randVal >= 13) {
                alert(randVal + '세' + '청소년');
            } else {
                alert(randVal + '세' + '어린이');
            }
        }
    </script>

</body>
</html>
